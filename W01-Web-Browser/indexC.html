<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 工具導航站 - Bootstrap 版</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    :root {
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-color: #1e293b;
      --border-color: #e2e8f0;
    }

    [data-bs-theme="dark"] {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text-color: #f1f5f9;
      --border-color: #334155;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: all 0.3s ease;
      font-family: 'Segoe UI', Microsoft JhengHei, sans-serif;
    }

    .tool-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .tool-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      border-color: #0dcaf0;
      /* Bootstrap info color */
    }

    [data-bs-theme="dark"] .tool-card:hover {
      box-shadow: 0 0 15px rgba(13, 202, 240, 0.3);
    }

    .card-banner {
      height: 140px;
      background-color: #000;
      position: relative;
      overflow: hidden;
    }

    .card-banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.7;
    }

    .tool-icon-wrapper {
      position: absolute;
      bottom: -20px;
      left: 20px;
      background: var(--card-bg);
      padding: 5px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .tool-icon {
      width: 40px;
      height: 40px;
      object-contain: center;
    }

    .tag-hash {
      font-size: 0.7rem;
      font-weight: 800;
      padding: 4px 8px;
      border-radius: 6px;
      margin-right: 5px;
      text-transform: uppercase;
      background: rgba(13, 202, 240, 0.1);
      color: #0dcaf0;
    }

    .search-input {
      border-radius: 50px;
      padding-left: 20px;
      background-color: var(--card-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
    }

    .btn-filter {
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.85rem;
      margin: 2px;
    }

    .line-clamp {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 3em;
    }
  </style>
</head>

<body>

  <div id="app" class="container py-5">
    <div class="d-flex justify-content-end mb-4">
      <button @click="toggleTheme" class="btn btn-outline-secondary btn-sm border-0">
        <span v-if="isDark">☀️ 亮色模式</span>
        <span v-else>🌙 暗色模式</span>
      </button>
    </div>

    <header class="row align-items-center mb-5">
      <div class="col-md-7 text-center text-md-start">
        <h1 class="display-5 fw-bold text-info">AI Tools Directory</h1>
        <p class="text-secondary">探索連結、分類與學習，建置您的 AI 工具庫</p>
      </div>
      <div class="col-md-5">
        <input v-model="searchQuery" type="text" class="form-control form-control-lg search-input"
          placeholder="搜尋名稱、功能或 #標籤...">
      </div>
    </header>

    <div class="d-flex flex-wrap justify-content-center justify-content-md-start mb-5">
      <button @click="selectedCategory = 'All'" class="btn btn-filter px-4"
        :class="selectedCategory === 'All' ? 'btn-info text-white' : 'btn-light text-secondary'">
        全部
      </button>
      <button v-for="cat in categories" :key="cat" @click="selectedCategory = cat" class="btn btn-filter px-4"
        :class="selectedCategory === cat ? 'btn-info text-white' : 'btn-light text-secondary'">
        {{ cat }}
      </button>
    </div>

    <div class="row g-4">
      <div v-for="item in filteredData" :key="item.id" class="col-12 col-sm-6 col-lg-4 col-xl-3">
        <div class="tool-card shadow-sm">
          <div class="card-banner">
            <img :src="item.bg" @error="handleImgError">
            <div class="tool-icon-wrapper">
              <img :src="item.icon" class="tool-icon" @error="handleIconError">
            </div>
          </div>

          <div class="p-4 pt-5 flex-grow-1">
            <h5 class="fw-bold mb-2">{{ item.name }}</h5>
            <p class="text-secondary small line-clamp mb-4">{{ item.function }}</p>

            <div class="mt-auto">
              <span class="tag-hash">#{{ item.category }}</span>
              <span class="tag-hash" style="color: #6610f2; background: rgba(102, 16, 242, 0.1);">#{{ item.detail
                }}</span>
            </div>
          </div>

          <div class="p-3 border-top d-flex justify-content-between align-items-center bg-light-subtle">
            <small class="text-muted font-monospace" style="font-size: 10px;">{{ item.date }}</small>
            <a :href="item.url" target="_blank" class="btn btn-sm text-info fw-bold p-0">造訪網站 ↗</a>
          </div>
        </div>
      </div>
    </div>

    <div v-if="filteredData.length === 0" class="text-center py-5">
      <h3 class="text-muted">🔍 找不到相關結果</h3>
    </div>
  </div>

  <script type="module">
    import { dbData } from './database.js';

    const { createApp, ref, computed, onMounted } = Vue;

    createApp({
      setup() {
        const searchQuery = ref('');
        const selectedCategory = ref('All');
        const isDark = ref(true);

        const toggleTheme = () => {
          isDark.value = !isDark.value;
          document.documentElement.setAttribute('data-bs-theme', isDark.value ? 'dark' : 'light');
          localStorage.setItem('theme', isDark.value ? 'dark' : 'light');
        };

        const categories = computed(() => {
          return [...new Set(dbData.map(item => item.category))];
        });

        const filteredData = computed(() => {
          return dbData.filter(item => {
            const q = searchQuery.value.toLowerCase();
            const matchSearch =
              item.name.toLowerCase().includes(q) ||
              item.function.toLowerCase().includes(q) ||
              item.detail.toLowerCase().includes(q);
            const matchCat = selectedCategory.value === 'All' || item.category === selectedCategory.value;
            return matchSearch && matchCat;
          });
        });

        const handleIconError = (e) => { e.target.src = 'https://www.google.com/s2/favicons?domain=google.com&sz=128'; };
        const handleImgError = (e) => { e.target.src = 'https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&w=600&q=80'; };

        onMounted(() => {
          const savedTheme = localStorage.getItem('theme') || 'dark';
          isDark.value = savedTheme === 'dark';
          document.documentElement.setAttribute('data-bs-theme', isDark.value ? 'dark' : 'light');
        });

        return {
          searchQuery,
          selectedCategory,
          categories,
          filteredData,
          isDark,
          toggleTheme,
          handleIconError,
          handleImgError
        };
      }
    }).mount('#app');
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
