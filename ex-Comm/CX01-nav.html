<script>




  // 定義卡片生成邏輯
  function generateCards() {
    // icon 隨機產生，從這邊開始  ~~  主要產生
    // 隨機排序卡片資料陣列
    const shuffledCardsData = shuffleArray(cardsData);

    // 獲取卡片容器
    const cardContainer = document.getElementById('nav-icon');
    cardContainer.innerHTML = '';
    // 生成卡片 HTML
    shuffledCardsData.forEach(card => {
      const cardHTML = `
      <li id="yf-ani-top-1" class="nav-item ">
        <a class="nav-link ${card.disable}" href="${card.link}" title=""><span style="color:${getRandomColor()}"
            class="yf-color-as2 fa-solid  ${card.iconClass} mx-1" title="${card.enterName}"></span></a>
      </li>`;

      // 將卡片 HTML 插入到卡片容器中
      // cardContainer.innerHTML += cardHTML;
      cardContainer.innerHTML = cardHTML + cardContainer.innerHTML;

    });

  }




  // 隨機生成顏色的輔助函數
  function getRandomColor() {
    const letters = '0123456789ABCDEF';
    let color = '#';
    for (let i = 0; i < 6; i++) {
      color += letters[Math.floor(Math.random() * 16)];
    }
    return color;
  }

  function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      // 交換元素
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }

  // 每10秒執行一次
  setInterval(generateCards, 10000);

  // 頁面加載時先生成一次卡片
  generateCards();


</script>
