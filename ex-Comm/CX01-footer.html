  // ###########  標籤往前數計時器-開始 - 可以用每一個地方  #############################
  // 往前數計時器(112.05.25) 後來改成年月日
  function leave_time(idData, countdownData) {
    var timer = null;
    var show = document.getElementById(idData);
    var target = new Date(countdownData);
    console.log(target);
    var today = new Date();
    //    var timeold = (today.getTime() - target.getTime()); 這一段落是往前計數
    var timeold = (target.getTime() - today.getTime());
    var sectimeold = timeold / 1000
    var secondsold = Math.floor(sectimeold);
    var msPerDay = 24 * 60 * 60 * 1000
    var e_daysold = timeold / msPerDay
    var yearsold = Math.floor(e_daysold / 365)
    var daysold = Math.floor(e_daysold);
    var daysold1 = Math.floor(e_daysold % 365);


    var e_hrsold = (e_daysold - daysold) * 24;
    var hrsold = Math.floor(e_hrsold);
    var e_minsold = (e_hrsold - hrsold) * 60;
    var minsold = Math.floor((e_hrsold - hrsold) * 60);
    var seconds = Math.floor((e_minsold - minsold) * 60);
    if (daysold < 0) {
      document.getElementById(idData).innerHTML = "計數結束!";
      clearInterval(timer);
    }
    else {
      if (daysold < 10) { daysold = "0" + daysold }
      if (hrsold < 10) { hrsold = "0" + hrsold }
      if (minsold < 10) { minsold = "0" + minsold }
      if (seconds < 10) { seconds = "0" + seconds }
      show.innerHTML = yearsold + "年：" + daysold1 + "天：" + hrsold + "時：" + minsold + "分：" + seconds + "秒";
    }
  }

    const vmarqueeElement = document.getElementById('yf-marquee-footer');

    const duration = 4000; // 每條消息的顯示時間（毫秒）

      const randomMessage = getRandomMessageG();

      vmarqueeElement.scrollTop = 0;
      // 延遲 1 秒後再次顯示下一條消息
    }, duration);
