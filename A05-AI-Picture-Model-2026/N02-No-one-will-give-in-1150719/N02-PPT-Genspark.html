<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenSpark投影片</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1a0f2e;
            /* 配合您投影片的深色調背景 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            /* 全域禁止滾輪 */
            display: flex;
            flex-direction: column;
        }

        /* 簡報顯示區域容器 */
        .presentation-container {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: 10px;
        }

        /* 縮放外框：固定投影片原始設計比例 */
        .slide-scaler {
            width: 1920px;
            height: 1080px;
            position: absolute;
            transform-origin: center center;
            /* 以中心為基準點縮放 */
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            background: #fff;
            overflow: hidden;
        }

        /* 內嵌框架：完全填滿縮放容器，並關閉滾輪 */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            overflow: hidden;
            /* 禁止 iframe 內部出現滾輪 */
        }

        /* 下方控制列 */
        .control-bar {
            height: 70px;
            width: 100%;
            background-color: #11091f;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            user-select: none;
            z-index: 100;
        }

        /* 按鈕樣式 */
        .btn {
            background-color: #c7522a;
            /* 採用投影片中的 rust 鐵鏽橘色調 */
            color: #f5f1e8;
            border: none;
            padding: 8px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s ease, opacity 0.2s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            background-color: #d4ff3f;
            /* 懸停時採用 acid 螢光綠色調 */
            color: #1a0f2e;
        }

        .btn:disabled {
            background-color: #444;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* 頁數提示樣式 */
        .page-info {
            color: #f5f1e8;
            font-size: 18px;
            font-family: monospace;
            letter-spacing: 0.1em;
            min-width: 120px;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="presentation-container" id="container">
        <div class="slide-scaler" id="scaler">
            <iframe id="slide-frame" src="A01.html" scrolling="no"></iframe>
        </div>
    </div>

    <div class="control-bar">
        <button id="prev-btn" class="btn" onclick="changeSlide(-1)">▲ 上一頁</button>
        <div id="page-display" class="page-info">01 / 10</div>
        <button id="next-btn" class="btn" onclick="changeSlide(1)">▼ 下一頁</button>
    </div>

    <script>
        // 設定要連接的 10 個 HTML 檔案清單
        const slides = [
            "./A01-GenSpark/A01.html",
            "./A01-GenSpark/A02.html",
            "./A01-GenSpark/A03.html",
            "./A01-GenSpark/A04.html",
            "./A01-GenSpark/A05.html",
            "./A01-GenSpark/A06.html",
            "./A01-GenSpark/A07.html",
            "./A01-GenSpark/A08.html",
            "./A01-GenSpark/A09.html",
            "./A01-GenSpark/A10.html",
            "./A01-GenSpark/A11.html",
            "./A01-GenSpark/A12.html",
            "./A01-GenSpark/A13.html",
            "./A01-GenSpark/A14.html",
            "./A01-GenSpark/A15.html",
            "./A01-GenSpark/A16.html",
            "./A01-GenSpark/A17.html",
            "./A01-GenSpark/A18.html",
            "./A01-GenSpark/A19.html",
            "./A01-GenSpark/A20.html",

          
        ];

        let currentIndex = 0;
        const iframe = document.getElementById('slide-frame');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const pageDisplay = document.getElementById('page-display');
        const scaler = document.getElementById('scaler');
        const container = document.getElementById('container');

        // 自動等比例縮放核心邏輯
        function resizeSlide() {
            const targetWidth = 1920;
            const targetHeight = 1080;

            // 獲取目前瀏覽器分配給投影片區域的實際寬高 (扣除下方控制列與 padding)
            const containerWidth = container.clientWidth - 20;
            const containerHeight = container.clientHeight - 20;

            // 計算寬與高的縮放比例，並取其極小值（確保長寬都不會超出螢幕）
            const scaleX = containerWidth / targetWidth;
            const scaleY = containerHeight / targetHeight;
            const scale = Math.min(scaleX, scaleY);

            // 套用 CSS transform 進行縮放
            scaler.style.transform = `scale(${scale})`;
        }

        // 更新投影片與頁碼狀態
        function updateUI() {
            iframe.src = slides[currentIndex];

            const currentNum = String(currentIndex + 1).padStart(2, '0');
            const totalNum = String(slides.length).padStart(2, '0');
            pageDisplay.textContent = `${currentNum} / ${totalNum}`;

            prevBtn.disabled = (currentIndex === 0);
            nextBtn.disabled = (currentIndex === slides.length - 1);
        }

        // 切換頁面函式
        function changeSlide(direction) {
            let targetIndex = currentIndex + direction;
            if (targetIndex >= 0 && targetIndex < slides.length) {
                currentIndex = targetIndex;
                updateUI();
            }
        }

        // 支援鍵盤方向鍵
        document.addEventListener('keydown', function (e) {
            if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                if (currentIndex > 0) changeSlide(-1);
            } else if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
                if (currentIndex < slides.length - 1) changeSlide(1);
            }
        });

        // 監聽視窗大小改變事件，隨時重新計算縮放比例
        window.addEventListener('resize', resizeSlide);

        // 初始化第一次載入
        updateUI();
        resizeSlide();

        // 確保 iframe 載入完成後再次微調大小
        iframe.onload = resizeSlide;
    </script>
</body>

</html>
