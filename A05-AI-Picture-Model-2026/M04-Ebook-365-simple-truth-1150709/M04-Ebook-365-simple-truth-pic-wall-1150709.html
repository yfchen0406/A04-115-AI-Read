<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>恍然大悟的365個簡單道理 - 隨機輪播版</title>
  <script src="A02-gold-sentence-data.js"></script>
  <link rel="stylesheet" href="/css/F01-1-note.css">
  <style>
    :root {
      --bg-color: #1a1a1a;
      --panel-bg: #2d2d2d;
      --accent-color: #ffd700;
      --text-color: #ffffff;
      --card-bg: rgba(45, 45, 45, 0.9);
      --link-color: #4fc3f7;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* 搜尋列樣式 */
    #search-container {
      background: var(--panel-bg);
      padding: 15px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-bottom: 1px solid #444;
      position: sticky;
      top: 0;
      z-index: 101;
    }

    /* 下拉功能表樣式 */
    .nav-dropdown-wrapper {
      position: absolute;
      left: 20px;
    }

    .nav-dropdown-btn {
      padding: 10px 16px;
      border-radius: 25px;
      border: 2px solid #64b5f6;
      background: linear-gradient(135deg, #1565c0, #1976d2);
      color: #ffffff;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.3s;
      white-space: nowrap;
      height: 42px;
      box-shadow: 0 2px 8px rgba(100, 181, 246, 0.3);
    }

    .nav-dropdown-btn:hover {
      background: linear-gradient(135deg, #1976d2, #2196f3);
      border-color: #90caf9;
      box-shadow: 0 4px 14px rgba(100, 181, 246, 0.5);
      transform: translateY(-1px);
    }

    .nav-dropdown-menu {
      display: none;
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      background: #ffffff;
      border: none;
      border-radius: 12px;
      min-width: 350px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      z-index: 200;
    }

    .nav-dropdown-menu.open {
      display: block;
      animation: dropDown 0.2s ease;
    }

    @keyframes dropDown {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .nav-dropdown-menu a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      color: #1a237e;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.18s, color 0.18s, padding-left 0.18s;
      border-bottom: 1px solid #e3f2fd;
      background: #ffffff;
    }

    .nav-dropdown-menu a:last-child {
      border-bottom: none;
    }

    .nav-dropdown-menu a:hover {
      background: linear-gradient(90deg, #e3f2fd, #bbdefb);
      color: #0d47a1;
      padding-left: 24px;
    }

    .search-box {
      position: relative;
      width: 100%;
      max-width: 650px;
      display: flex;
      gap: 80px;
      align-items: center;
    }

    .search-input-wrapper {
      position: relative;
      flex: 1;
    }

    #search-input {
      width: 100%;
      padding: 10px 15px 10px 40px;
      border-radius: 25px;
      border: 1px solid #555;
      background: #1a1a1a;
      color: white;
      font-size: 16px;
      outline: none;
      transition: 0.3s;
    }

    #search-input:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
    }

    .search-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #888;
    }

    /* 隨機按鈕樣式 */
    #random-play-btn {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1px solid var(--accent-color);
      background: transparent;
      color: var(--accent-color);
      cursor: pointer;
      white-space: nowrap;
      font-weight: bold;
      transition: all 0.3s;
    }

    #random-play-btn.active {
      background: var(--accent-color);
      color: #000;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
    }

    /* 照片牆樣式 - 6 欄排列 */
    #gallery-grid-view {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      padding: 20px;
      background: var(--bg-color);
    }

    .grid-item {
      cursor: pointer;
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid #444;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      background-color: #000;
      display: flex;
      flex-direction: column;
    }

    .grid-item:hover {
      transform: translateY(-5px);
      border-color: var(--accent-color);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
      z-index: 10;
    }

    .grid-item img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
    }

    .grid-item .grid-title {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.7);
      font-size: 11px;
      padding: 5px 2px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      backdrop-filter: blur(4px);
    }

    .hidden {
      display: none !important;
    }

    /* 上方資訊區 */
    #info-header {
      background: var(--panel-bg);
      padding: 12px 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      border-bottom: 2px solid var(--accent-color);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
    }

    #info-header h2 {
      margin: 0;
      color: var(--accent-color);
      font-size: 1.1em;
      letter-spacing: 1px;
    }

    .meta-group {
      display: flex;
      gap: 15px;
      font-size: 0.85em;
      color: #ccc;
      align-items: center;
    }

    .header-right {
      text-align: right;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-right a {
      color: var(--link-color);
      text-decoration: none;
      background: rgba(79, 195, 247, 0.1);
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid rgba(79, 195, 247, 0.3);
      font-size: 0.9em;
      transition: 0.3s;
      white-space: nowrap;
    }

    /* 語音控制區樣式 */
    .voice-settings {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 0, 0, 0.3);
      padding: 5px 10px;
      border-radius: 8px;
      border: 1px solid #444;
    }

    .voice-settings select {
      background: #1a1a1a;
      color: white;
      border: 1px solid #555;
      font-size: 12px;
      padding: 2px 5px;
      border-radius: 4px;
      max-width: 120px;
    }

    .auto-play-label {
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
      color: #aaa;
      cursor: pointer;
    }

    /* 語音播放按鈕樣式 */
    .play-voice-btn {
      background: var(--accent-color);
      color: #000;
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      transition: 0.2s;
      flex-shrink: 0;
    }

    .play-voice-btn:hover {
      transform: scale(1.1);
    }

    /* 圖片展示主區塊 */
    #gallery-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 10px;
      background: radial-gradient(circle, #2c2c2c 0%, #000000 100%);
      position: relative;
    }

    #current-image {
      max-width: 98%;
      max-height: 75vh;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.9);
      border-radius: 4px;
      object-fit: contain;
      transition: opacity 0.4s ease;
    }

    /* 下方控制列 */
    #control-footer {
      background: var(--panel-bg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      border-top: 1px solid #444;
      height: 65px;
    }

    .nav-btn {
      background: rgba(255, 215, 0, 0.1);
      border: 1px solid var(--accent-color);
      color: var(--accent-color);
      padding: 6px 14px;
      font-size: 0.9em;
      font-weight: bold;
      cursor: pointer;
      border-radius: 20px;
      transition: 0.3s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .nav-btn:hover {
      background: var(--accent-color);
      color: #000;
    }

    .center-controls {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    /* 跳轉選單 */
    #jump-select {
      padding: 8px 12px;
      border-radius: 8px;
      background: #1a1a1a;
      color: white;
      border: 1px solid var(--accent-color);
      font-size: 14px;
      width: 320px;
      cursor: pointer;
      outline: none;
    }

    #counter {
      font-family: monospace;
      color: var(--accent-color);
      font-weight: bold;
      min-width: 80px;
      text-align: center;
      font-size: 1em;
    }

    /* 手機版優化 */
    @media (max-width: 768px) {
      #gallery-grid-view {
        grid-template-columns: repeat(3, 1fr);
      }

      #jump-select {
        width: 220px;
      }

      .voice-settings {
        display: none;
      }

      .search-box {
        gap: 20px;
      }
    }

    @media (max-width: 480px) {
      #gallery-grid-view {
        grid-template-columns: repeat(2, 1fr);
      }

      #control-footer {
        height: auto;
        padding: 10px;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
      }

      .center-controls {
        order: -1;
        width: 100%;
        justify-content: center;
      }

      #jump-select {
        width: 100%;
      }

      #random-play-btn {
        padding: 8px 10px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

  <div id="search-container">

    <!-- 左側下拉功能表 -->
    <div class="nav-dropdown-wrapper">
      <button class="nav-dropdown-btn" onclick="toggleNavDropdown()" id="nav-dropdown-btn">
        ☰ 功能選單
      </button>
      <div class="nav-dropdown-menu" id="nav-dropdown-menu">
        <a href="./S00-Data-Tool/A01-transfer-data.html" target="_blank">📄 A1-資料轉換~A4比較好用</a>
        <a href="./S00-Data-Tool/A02-sort-data.html" target="_blank">📄 A2-資料排序</a>
        <a href="./S00-Data-Tool/A03-wisdom-classifier.html" target="_blank">📄 A3-金句分類</a>
        <a href="./S00-Data-Tool/A04-data3-to-ebookdata.html" target="_blank">📄 A4-智慧箴言資料轉換至金句牆</a>
      </div>
    </div>

    <div class="search-box">
      <div class="search-input-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="搜尋標題、類別或關鍵字..." oninput="handleSearch(this.value)">
      </div>
      <button id="random-play-btn" onclick="toggleRandomPlay()">🔀 隨機輪播</button>
    </div>
  </div>

  <div id="gallery-grid-view"></div>

  <header id="info-header" class="hidden">
    <div class="header-left">
      <h2 id="display-title">載入中...</h2>
      <div class="meta-group">
        <span id="display-date"></span>
        <span id="display-category" style="color:var(--accent-color)"></span>
        <button class="play-voice-btn" id="voice-btn" onclick="speakTitle()" title="朗讀標題">🔊</button>
      </div>
    </div>
    <div class="header-right">
      <div class="voice-settings">
        <label class="auto-play-label">
          <input type="checkbox" id="auto-voice-toggle"> 自動播放
        </label>
        <select id="voice-select" title="選擇語音版本"></select>
      </div>
      <div id="display-link"></div>
    </div>
  </header>

  <main id="gallery-main" class="hidden">
    <img id="current-image" src="" alt="生活紀錄圖片">
  </main>

  <footer id="control-footer" class="hidden">
    <button class="nav-btn" onclick="changeSlide(-1)">◀ 上一張</button>

    <div class="center-controls">
      <button class="nav-btn" onclick="showGridView()" style="background: var(--accent-color); color: #000;">🏠
        首頁牆</button>
      <span id="counter">0 / 0</span>
      <select id="jump-select" onchange="jumpToSlide(this.value)"></select>
    </div>

    <button class="nav-btn" onclick="changeSlide(1)">下一張 ▶</button>
  </footer>

  <script>
    const data = (typeof lifeData !== 'undefined') ? lifeData : [];

    // 下拉功能表控制
    function toggleNavDropdown() {
      const menu = document.getElementById('nav-dropdown-menu');
      menu.classList.toggle('open');
    }

    document.addEventListener('click', function (e) {
      const wrapper = document.querySelector('.nav-dropdown-wrapper');
      if (wrapper && !wrapper.contains(e.target)) {
        document.getElementById('nav-dropdown-menu').classList.remove('open');
      }
    });
    let currentIndex = 0;
    let filteredData = [...data];
    let voices = [];

    let isRandomPlaying = false;
    let randomTimer = null;

    const searchContainer = document.getElementById('search-container');
    const searchInput = document.getElementById('search-input');
    const gridView = document.getElementById('gallery-grid-view');
    const mainHeader = document.getElementById('info-header');
    const mainContent = document.getElementById('gallery-main');
    const mainFooter = document.getElementById('control-footer');

    const imgEl = document.getElementById('current-image');
    const titleEl = document.getElementById('display-title');
    const dateEl = document.getElementById('display-date');
    const catEl = document.getElementById('display-category');
    const linkEl = document.getElementById('display-link');
    const counterEl = document.getElementById('counter');
    const jumpSelect = document.getElementById('jump-select');
    const voiceSelect = document.getElementById('voice-select');
    const autoVoiceToggle = document.getElementById('auto-voice-toggle');

    function initApp() {
      if (data.length === 0) {
        document.body.innerHTML = "<h2 style='color:white; text-align:center; margin-top:50px;'>載入資料中或找不到資料...</h2>";
        return;
      }
      renderGridView(data);
      initSelect();
      loadVoices();

      if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = loadVoices;
      }
    }

    function loadVoices() {
      voices = speechSynthesis.getVoices();
      voiceSelect.innerHTML = '';
      const zhVoices = voices.filter(v => v.lang.includes('zh') || v.lang.includes('cht'));
      zhVoices.forEach((voice, i) => {
        const option = document.createElement('option');
        option.value = i;
        let displayName = voice.name.replace('Microsoft ', '').replace('Google ', '');
        option.textContent = displayName;
        voiceSelect.appendChild(option);
      });
      if (zhVoices.length === 0) {
        const opt = document.createElement('option');
        opt.textContent = "預設語音";
        voiceSelect.appendChild(opt);
      }
    }

    function toggleRandomPlay() {
      const btn = document.getElementById('random-play-btn');
      isRandomPlaying = !isRandomPlaying;

      if (isRandomPlaying) {
        btn.classList.add('active');
        btn.innerHTML = "⏹ 停止輪播";
        playNextRandom();
      } else {
        btn.classList.remove('active');
        btn.innerHTML = "🔀 隨機輪播";
        stopSpeech();
        clearTimeout(randomTimer);
      }
    }

    function playNextRandom() {
      if (!isRandomPlaying) return;

      currentIndex = Math.floor(Math.random() * data.length);
      enterMainView();
      render();

      const text = data[currentIndex].title;
      if (!text) {
        randomTimer = setTimeout(playNextRandom, 3000);
        return;
      }

      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      const zhVoices = voices.filter(v => v.lang.includes('zh') || v.lang.includes('cht'));
      if (zhVoices.length > 0 && voiceSelect.value !== '') {
        utterance.voice = zhVoices[voiceSelect.value];
      }
      utterance.lang = 'zh-TW';
      utterance.rate = 0.95;

      const voiceBtn = document.getElementById('voice-btn');
      utterance.onstart = () => { if (voiceBtn) voiceBtn.innerHTML = "⏹"; };

      utterance.onend = () => {
        if (voiceBtn) voiceBtn.innerHTML = "🔊";
        if (isRandomPlaying) {
          randomTimer = setTimeout(playNextRandom, 3000);
        }
      };

      utterance.onerror = () => {
        if (isRandomPlaying) randomTimer = setTimeout(playNextRandom, 3000);
      };

      window.speechSynthesis.speak(utterance);
    }

    function handleSearch(query) {
      const q = query.toLowerCase().trim();
      if (!q) {
        filteredData = [...data];
      } else {
        filteredData = data.filter(item =>
          item.title.toLowerCase().includes(q) ||
          item.category.toLowerCase().includes(q) ||
          (item.date && item.date.includes(q))
        );
      }
      renderGridView(filteredData);
    }

    function renderGridView(items) {
      gridView.innerHTML = '';
      if (items.length === 0) {
        gridView.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 50px; color: #888;">找不到符合的金句</div>`;
        return;
      }
      items.forEach((item) => {
        const originalIndex = data.findIndex(d => d === item);
        const div = document.createElement('div');
        div.className = 'grid-item';
        div.innerHTML = `
          <img src="${item.image}" alt="${item.title}" loading="lazy">
          <div class="grid-title">${item.title}</div>
        `;
        div.onclick = () => {
          if (isRandomPlaying) toggleRandomPlay();
          currentIndex = originalIndex;
          enterMainView();
        };
        gridView.appendChild(div);
      });
    }

    function initSelect() {
      jumpSelect.innerHTML = '';
      data.forEach((item, index) => {
        const opt = document.createElement('option');
        opt.value = index;
        opt.textContent = `${index + 1}. ${item.title}`;
        jumpSelect.appendChild(opt);
      });
    }

    function enterMainView() {
      render();
      searchContainer.classList.add('hidden');
      gridView.classList.add('hidden');
      mainHeader.classList.remove('hidden');
      mainContent.classList.remove('hidden');
      mainFooter.classList.remove('hidden');
      window.scrollTo(0, 0);

      if (!isRandomPlaying && autoVoiceToggle.checked) {
        setTimeout(speakTitle, 500);
      }
    }

    function showGridView() {
      if (isRandomPlaying) toggleRandomPlay();
      stopSpeech();
      searchContainer.classList.remove('hidden');
      gridView.classList.remove('hidden');
      mainHeader.classList.add('hidden');
      mainContent.classList.add('hidden');
      mainFooter.classList.add('hidden');
      window.scrollTo(0, 0);
    }

    function render() {
      if (data.length === 0) return;
      const item = data[currentIndex];
      titleEl.textContent = item.title;
      dateEl.textContent = `📅 ${item.date}`;
      catEl.textContent = `📂 ${item.category}`;

      // 處理連結：從 prompt 中抓取網址並附加 #date 作為索引
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = item.prompt || "";
      const links = tempDiv.querySelectorAll('a');
      linkEl.innerHTML = '';

      if (links.length > 0) {
        links.forEach(a => {
          const newA = a.cloneNode(true);
          // 核心修改：將連結網址加上日期索引
          const originalHref = newA.getAttribute('href');
          if (originalHref && item.date) {
            // 確保如果原本已有 hash 則替換，否則附加
            const baseUrl = originalHref.split('#')[0];
            newA.setAttribute('href', `${baseUrl}#${item.date}`);
          }
          linkEl.appendChild(newA);
        });
      }

      imgEl.style.opacity = 0;
      imgEl.src = item.image;
      imgEl.onload = () => { imgEl.style.opacity = 1; };
      counterEl.textContent = `${currentIndex + 1} / ${data.length}`;
      jumpSelect.value = currentIndex;
    }

    function changeSlide(step) {
      if (isRandomPlaying) toggleRandomPlay();
      stopSpeech();
      const newIndex = currentIndex + step;
      if (newIndex >= 0 && newIndex < data.length) {
        currentIndex = newIndex;
        render();
        if (autoVoiceToggle.checked) setTimeout(speakTitle, 300);
      }
    }

    function jumpToSlide(index) {
      if (isRandomPlaying) toggleRandomPlay();
      stopSpeech();
      currentIndex = parseInt(index);
      render();
      if (!gridView.classList.contains('hidden')) enterMainView();
    }

    function speakTitle() {
      const text = data[currentIndex].title;
      if (!text) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      const zhVoices = voices.filter(v => v.lang.includes('zh') || v.lang.includes('cht'));
      if (zhVoices.length > 0 && voiceSelect.value !== '') {
        utterance.voice = zhVoices[voiceSelect.value];
      }
      utterance.lang = 'zh-TW';
      utterance.rate = 0.95;
      const voiceBtn = document.getElementById('voice-btn');
      utterance.onstart = () => { if (voiceBtn) voiceBtn.innerHTML = "⏹"; };
      utterance.onend = () => { if (voiceBtn) voiceBtn.innerHTML = "🔊"; };
      window.speechSynthesis.speak(utterance);
    }

    function stopSpeech() {
      window.speechSynthesis.cancel();
      const voiceBtn = document.getElementById('voice-btn');
      if (voiceBtn) voiceBtn.innerHTML = "🔊";
    }

    document.addEventListener('keydown', (e) => {
      if (mainContent.classList.contains('hidden')) {
        if (e.key === '/') { e.preventDefault(); searchInput.focus(); }
        return;
      }
      if (e.key === 'ArrowLeft') changeSlide(-1);
      if (e.key === 'ArrowRight') changeSlide(1);
      if (e.key === 'Escape') showGridView();
      if (e.key === ' ') { e.preventDefault(); speakTitle(); }
    });

    let touchStartX = 0;
    mainContent.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, false);
    mainContent.addEventListener('touchend', e => {
      const touchEndX = e.changedTouches[0].screenX;
      if (touchEndX < touchStartX - 60) changeSlide(1);
      if (touchEndX > touchStartX + 60) changeSlide(-1);
    }, false);

    initApp();
  </script>
</body>

</html>
