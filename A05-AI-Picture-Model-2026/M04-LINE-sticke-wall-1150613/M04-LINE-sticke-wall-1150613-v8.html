<!DOCTYPE html>
<html lang="zh-Hant">
<!-- 
  貼圖牆 – 貼圖包展示與分享 (修改版 v9)
  開發框架: Bootstrap 4/5 混合
  資料庫獨立: sticker-db.js
  功能: 貼圖包卡片 + 合成預覽圖(顯示所有貼圖，每行3張) + 分類篩選 + 模態框細節
  修改內容(2026.06.13)：
    1. 主畫面貼圖牆一列8張（桌機），卡片尺寸縮小。
    2. 預覽圖改為每行3張，所有貼圖完整顯示。
    3. 模態框內點擊貼圖會複製「圖片本身」(如同右鍵複製圖片)，桌機拖曳保留。
    4. 查看貼圖視窗縮小至最大寬度500px，**貼圖尺寸放大至少兩倍**（圖片最小寬度150px，桌機改為4列），讓貼圖清晰易點。
-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>貼圖收藏牆 | 複製貼圖圖片</title>
  <link rel="shortcut icon" href="#" type="image/x-icon">
  <!-- Bootstrap 4 & 5 資源 -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  <!-- Bootstrap 5 (主要互動依賴) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Font Awesome 6 & 圖示庫 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
  <!-- Google Font：Noto Sans TC -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Noto Sans TC', sans-serif;
    }
    body {
      background-color: #212529 !important;
    }
    /* 卡片自訂樣式 */
    .sticker-card {
      transition: transform 0.2s ease, box-shadow 0.2s;
      border: none;
      border-radius: 1rem;
      overflow: hidden;
      background: #ffffff;
      cursor: pointer;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .sticker-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 20px rgba(0,0,0,0.1);
    }
    /* 合成預覽網格：每行3張，顯示所有貼圖 */
    .preview-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      background-color: #f8f9fa;
      width: 100%;
    }
    .preview-grid img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: #e9ecef;
    }
    /* 只有1張貼圖時，讓圖片佔滿整個寬度 */
    .preview-grid:has(> img:only-child) {
      grid-template-columns: 1fr;
    }
    /* 卡片標籤與文字 */
    .card-badge {
      font-size: 0.7rem;
      font-weight: 500;
    }
    /* 篩選列 – 手機橫向滾動 */
    .filter-scroll-x {
      overflow-x: auto;
      white-space: nowrap;
      flex-wrap: nowrap;
      display: flex;
      gap: 0.5rem;
      padding-bottom: 0.5rem;
      scrollbar-width: thin;
    }
    .filter-scroll-x .btn {
      white-space: nowrap;
      flex-shrink: 0;
    }
    /* 主畫面卡片網格：桌機一列8張，平板/手機自適應 */
    .sticker-grid-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
    }
    @media (min-width: 1200px) {
      .sticker-grid-row {
        grid-template-columns: repeat(8, 1fr);
      }
    }
    @media (max-width: 1199px) and (min-width: 768px) {
      .sticker-grid-row {
        grid-template-columns: repeat(4, 1fr);
      }
    }
    @media (max-width: 767px) {
      .sticker-grid-row {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.75rem;
      }
    }
    /* 卡片內部內容緊緻 */
    .card-body {
      padding: 0.6rem;
    }
    .card-title {
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 0.2rem;
    }
    .card-text {
      font-size: 0.7rem;
      margin-bottom: 0;
    }
    .view-detail-btn {
      font-size: 0.7rem;
      padding: 0.3rem 0;
    }
    /* ========== 模態框內貼圖 - 放大至少兩倍 ========== */
    /* 桌機：改為4列，每張圖片最小寬度150px (原約70px，放大兩倍以上) */
    .modal-sticker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1rem;
    }
    /* 桌機強制4列，讓圖片更大 */
    @media (min-width: 992px) {
      .modal-sticker-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
    /* 手機仍保持自動彈性，但最小寬度也加大 */
    @media (max-width: 576px) {
      .modal-sticker-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 0.75rem;
      }
    }
    .sticker-item {
      text-align: center;
      transition: 0.1s;
    }
    .sticker-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: contain;
      background: #f8f9fa;
      border-radius: 0.75rem;
      padding: 6px;
      transition: 0.1s ease;
      cursor: pointer;
      border: 1px solid #dee2e6;
      box-sizing: border-box;
    }
    .sticker-img:active {
      transform: scale(0.96);
    }
    /* 響應式調整 */
    @media (max-width: 576px) {
      body {
        font-size: 14px;
      }
      .card-title {
        font-size: 0.75rem;
      }
      .sticker-img {
        border-radius: 0.5rem;
        padding: 4px;
      }
    }
    .no-result {
      text-align: center;
      padding: 3rem;
      color: #6c757d;
    }
    .bg-white-main {
      background-color: #ffffff;
      border-radius: 2rem 2rem 0 0;
    }
    /* 複製成功提示快顯 */
    .toast-copy {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: rgba(0,0,0,0.8);
      color: white;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 14px;
      z-index: 9999;
      white-space: nowrap;
      pointer-events: none;
      animation: fadeOut 2s ease forwards;
    }
    @keyframes fadeOut {
      0% { opacity: 0.9; }
      70% { opacity: 0.9; }
      100% { opacity: 0; visibility: hidden; }
    }
    /* 調整 modal 整體尺寸：維持較小寬度，但內部圖片已放大 */
    .custom-modal-dialog {
      max-width: 650px;  /* 稍微放寬以容納更大圖片，但仍比之前大視窗小 */
      width: 92%;
      margin: 1.75rem auto;
    }
    @media (max-width: 576px) {
      .custom-modal-dialog {
        width: calc(100% - 1rem);
        max-width: none;
        margin: 0.5rem;
      }
    }
  </style>
</head>
<body id="n0" class="bg-dark">
  <div id="nav1"></div>
  <header class="text-center pt-4 pb-2" style="margin-top: 75px; background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);">
    <h1 class="display-6 fw-bold text-dark">🧸 貼圖收藏牆 | 點擊圖片複製圖片本身</h1>
    <p class="lead text-muted">貼圖包完整預覽 · 點擊任何貼圖即可複製圖片（如右鍵複製） · 再到 LINE 聊天室貼上傳送</p>
  </header>
  <div class="container-fluid yf-font1 bg-white-main" style="background-color: white;">
    <div class="row px-2 px-md-4 py-3">
      <div class="col-12 mb-4">
        <div class="d-flex align-items-center gap-2 mb-2">
          <i class="fas fa-filter text-primary"></i>
          <span class="fw-bold">分類篩選</span>
        </div>
        <div class="filter-scroll-x w-100" id="filterContainer"></div>
      </div>
      <div class="col-12">
        <div class="sticker-grid-row" id="stickerPackGrid"></div>
      </div>
    </div>
  </div>
  <div id="footer"></div>

  <!-- Modal：視窗適中，內部貼圖已放大 -->
  <div class="modal fade" id="stickerModal" data-bs-backdrop="static" data-bs-keyboard="true" tabindex="-1" aria-labelledby="stickerModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen-sm-down modal-dialog-scrollable custom-modal-dialog">
      <div class="modal-content">
        <div class="modal-header bg-white border-0 pt-3 pb-1">
          <div>
            <h5 class="modal-title fw-bold" id="stickerModalLabel">📦 貼圖包名稱</h5>
            <p class="text-muted small mb-0" id="modalPackDesc"></p>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="關閉"></button>
        </div>
        <div class="modal-body pt-2" id="modalStickerList"></div>
        <div class="modal-footer bg-light border-0 py-2">
          <small class="text-secondary"><i class="fa-regular fa-lightbulb"></i> 提示：點擊任何貼圖即可「複製圖片」，再到 LINE 聊天室貼上；桌機也可直接拖曳貼圖至 LINE 視窗。</small>
        </div>
      </div>
    </div>
  </div>

  <script src="sticker-db.js"></script>
  <script>
    let currentFilter = "All";
    const isTouchDevice = () => (('ontouchstart' in window) || (navigator.maxTouchPoints > 0));
    const isMobileLike = isTouchDevice();

    function showMessage(msg, isError = false) {
      const existing = document.querySelector('.toast-copy');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = 'toast-copy';
      toast.textContent = msg;
      toast.style.backgroundColor = isError ? 'rgba(220,53,69,0.9)' : 'rgba(6,199,85,0.9)';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    // 複製圖片到剪貼簿（圖片本身）
    async function copyImageToClipboard(imgUrl) {
      try {
        const response = await fetch(imgUrl);
        if (!response.ok) throw new Error('圖片載入失敗');
        const blob = await response.blob();
        const clipboardItem = new ClipboardItem({
          [blob.type]: blob
        });
        await navigator.clipboard.write([clipboardItem]);
        showMessage('✓ 圖片已複製，可貼到 LINE 聊天室');
      } catch (err) {
        console.error('複製圖片失敗:', err);
        try {
          const img = new Image();
          img.crossOrigin = 'Anonymous';
          img.src = imgUrl;
          await new Promise((resolve, reject) => {
            img.onload = resolve;
            img.onerror = reject;
          });
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          canvas.toBlob(async (blob) => {
            if (blob) {
              await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
              showMessage('✓ 圖片已複製 (canvas)');
            } else {
              showMessage('❌ 無法複製圖片，可能是跨域限制', true);
            }
          }, 'image/png');
        } catch (fallbackErr) {
          showMessage('❌ 複製失敗，請嘗試右鍵複製圖片', true);
        }
      }
    }

    // 合成預覽圖：每行3張，顯示所有貼圖
    function renderPreviewGrid(stickersArr) {
      if (!stickersArr || stickersArr.length === 0) {
        return `<div class="preview-grid d-flex align-items-center justify-content-center" style="background:#f1f3f5; min-height:120px;"><span class="text-muted small">無貼圖</span></div>`;
      }
      const imagesHtml = stickersArr.map(s => {
        let imgSrc = s.img || 'https://via.placeholder.com/150?text=貼圖';
        return `<img src="${escapeHtml(imgSrc)}" class="img-fluid" alt="貼圖預覽" loading="lazy" onerror="this.src='https://via.placeholder.com/150?text=載入錯誤'">`;
      }).join('');
      return `<div class="preview-grid">${imagesHtml}</div>`;
    }

    function renderStickerPacks() {
      const container = document.getElementById('stickerPackGrid');
      if (!container) return;
      if (typeof stickerPacks === 'undefined') {
        container.innerHTML = `<div class="alert alert-warning w-100">⚠️ 貼圖資料庫載入失敗</div>`;
        return;
      }
      let filtered = stickerPacks;
      if (currentFilter !== "All") filtered = stickerPacks.filter(p => p.category === currentFilter);
      if (filtered.length === 0) {
        container.innerHTML = `<div class="no-result w-100"><i class="fa-regular fa-face-frown fa-2x"></i><p>無此分類貼圖包</p></div>`;
        return;
      }
      let cards = '';
      filtered.forEach(pack => {
        const preview = renderPreviewGrid(pack.stickers);
        cards += `
          <div class="sticker-card" data-pack-id="${pack.id}">
            ${preview}
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-start mb-1">
                <h5 class="card-title text-truncate-custom" title="${escapeHtml(pack.name)}">${escapeHtml(pack.name)}</h5>
                <span class="badge bg-secondary rounded-pill card-badge">${escapeHtml(pack.category)}</span>
              </div>
              <p class="card-text text-muted">${escapeHtml(pack.description || '精選貼圖組合')}</p>
            </div>
            <div class="card-footer bg-white border-0 pb-2 pt-0">
              <button class="btn btn-outline-primary w-100 view-detail-btn" data-pack-id="${pack.id}">
                <i class="fa-regular fa-images"></i> 查看貼圖 (${pack.stickers.length})
              </button>
            </div>
          </div>
        `;
      });
      container.innerHTML = cards;
      document.querySelectorAll('.sticker-card').forEach(card => {
        const id = parseInt(card.dataset.packId);
        card.addEventListener('click', (e) => {
          if (e.target.closest('.view-detail-btn')) return;
          openModal(parseInt(card.dataset.packId));
        });
      });
      document.querySelectorAll('.view-detail-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          openModal(parseInt(btn.dataset.packId));
        });
      });
    }

    function openModal(packId) {
      if (typeof stickerPacks === 'undefined') return;
      const pack = stickerPacks.find(p => p.id === packId);
      if (!pack) return;
      document.getElementById('stickerModalLabel').innerText = pack.name;
      document.getElementById('modalPackDesc').innerHTML = `${escapeHtml(pack.description || '')} <span class="badge bg-info text-dark">${escapeHtml(pack.category)}</span>`;
      const modalBody = document.getElementById('modalStickerList');
      if (!pack.stickers || pack.stickers.length === 0) {
        modalBody.innerHTML = `<div class="text-center p-5">無貼圖</div>`;
      } else {
        let gridHtml = `<div class="modal-sticker-grid">`;
        pack.stickers.forEach(sticker => {
          const imgUrl = sticker.img || 'https://via.placeholder.com/150?text=貼圖';
          const draggableAttr = (!isMobileLike) ? 'draggable="true"' : 'draggable="false"';
          gridHtml += `
            <div class="sticker-item">
              <img src="${escapeHtml(imgUrl)}" 
                   class="sticker-img" 
                   alt="貼圖" 
                   loading="lazy"
                   ${draggableAttr}
                   data-img-url="${escapeHtml(imgUrl)}"
                   onerror="this.src='https://via.placeholder.com/150?text=讀取錯誤'">
            </div>
          `;
        });
        gridHtml += `</div>`;
        modalBody.innerHTML = gridHtml;

        modalBody.querySelectorAll('.sticker-img').forEach(img => {
          const imgUrl = img.getAttribute('data-img-url');
          img.addEventListener('click', async (e) => {
            e.stopPropagation();
            if (imgUrl) {
              await copyImageToClipboard(imgUrl);
            } else {
              showMessage('❌ 無效的圖片', true);
            }
          });
          if (!isMobileLike) {
            img.addEventListener('dragstart', (e) => {
              e.dataTransfer.setData('text/plain', imgUrl);
              e.dataTransfer.effectAllowed = 'copy';
              const dragIcon = document.createElement('div');
              dragIcon.textContent = '📎 貼圖';
              dragIcon.style.position = 'absolute';
              dragIcon.style.top = '-1000px';
              document.body.appendChild(dragIcon);
              e.dataTransfer.setDragImage(dragIcon, 10, 10);
              setTimeout(() => dragIcon.remove(), 0);
            });
          }
        });
      }
      const modalEl = document.getElementById('stickerModal');
      const modalInstance = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
      modalInstance.show();
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    function buildFilterButtons() {
      if (typeof stickerPacks === 'undefined') {
        document.getElementById('filterContainer').innerHTML = `<button class="btn btn-secondary disabled">無法載入</button>`;
        return;
      }
      const cats = [...new Set(stickerPacks.map(p => p.category))].sort();
      let html = `<button class="btn btn-primary filter-btn" data-filter="All">🏠 全部貼圖包</button>`;
      cats.forEach(c => { html += `<button class="btn btn-outline-secondary filter-btn" data-filter="${escapeHtml(c)}">${escapeHtml(c)}</button>`; });
      document.getElementById('filterContainer').innerHTML = html;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentFilter = btn.dataset.filter;
          document.querySelectorAll('.filter-btn').forEach(b => {
            if (b.dataset.filter === currentFilter) {
              b.classList.remove('btn-outline-secondary');
              b.classList.add('btn-primary');
            } else {
              b.classList.remove('btn-primary');
              b.classList.add('btn-outline-secondary');
            }
          });
          renderStickerPacks();
        });
      });
    }

    function init() {
      if (typeof stickerPacks !== 'undefined') {
        buildFilterButtons();
        renderStickerPacks();
      } else {
        const interval = setInterval(() => {
          if (typeof stickerPacks !== 'undefined') {
            clearInterval(interval);
            buildFilterButtons();
            renderStickerPacks();
          }
        }, 100);
        setTimeout(() => {
          clearInterval(interval);
          if (typeof stickerPacks === 'undefined') {
            document.getElementById('stickerPackGrid').innerHTML = `<div class="alert alert-danger">無法載入 sticker-db.js</div>`;
          }
        }, 1500);
      }
    }

    $(document).ready(() => {
      $("#nav1").load("/B02A-2026-Book-read/F01-ex-comm/FX02-nav-2026.html", () => {});
      $("#footer").load("/ex-Comm/CX01-footer.html", () => {});
      init();
    });
  </script>
</body>
</html>
