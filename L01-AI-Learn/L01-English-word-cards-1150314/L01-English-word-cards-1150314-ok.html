<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日英文單字圖卡 - 多益發音強化版</title>
  <script src="A01-vocab_data.js"></script>
  <style>
    :root {
      --primary-color: #0284c7;
      --primary-hover: #0369a1;
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --border-color: #e2e8f0;
    }

    body.dark-mode {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --border-color: #334155;
      --primary-color: #38bdf8;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background-color 0.3s, color 0.3s;
    }

    #header-container {
      background: var(--card-bg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 25px;
      border-bottom: 1px solid var(--border-color);
      box-shadow: var(--shadow-sm);
      z-index: 100;
    }

    #category-index {
      display: flex;
      gap: 10px;
      padding: 15px 0;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .index-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      padding: 8px 20px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      color: var(--text-muted);
      transition: all 0.25s;
      white-space: nowrap;
      font-size: 14px;
    }

    .index-btn:hover {
      border-color: var(--primary-color);
      color: var(--primary-color);
    }

    .index-btn.active {
      background: var(--primary-color);
      color: #ffffff;
      border-color: var(--primary-color);
    }

    #theme-toggle {
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 8px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    #app-container {
      flex: 1;
      overflow-y: auto;
      padding: 30px;
      scroll-behavior: smooth;
    }

    #gallery-grid-view {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
    }

    .grid-item {
      background: var(--card-bg);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      box-shadow: var(--shadow-md);
      transition: all 0.3s ease;
      border: 1px solid var(--border-color);
    }

    .grid-item:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-lg);
      border-color: var(--primary-color);
    }

    .grid-item .item-tag {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      background: var(--primary-color);
      color: white;
      font-size: 13px;
      font-weight: 700;
      padding: 6px 0;
      text-align: center;
      z-index: 10;
    }

    .grid-item img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      display: block;
      margin-top: 30px;
      background: rgba(0, 0, 0, 0.05);
    }

    #main-view {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--card-bg);
      display: none;
      z-index: 1000;
      flex-direction: column;
    }

    .main-header {
      height: 60px;
      padding: 0 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
    }

    #card-id-label {
      color: var(--primary-color);
      font-size: 20px;
      font-weight: 800;
    }

    .close-btn {
      font-size: 18px;
      cursor: pointer;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      color: var(--text-main);
      align-items: center;
      justify-content: center;
    }

    .detail-content {
      flex: 1;
      display: flex;
      padding: 30px;
      gap: 30px;
      overflow: hidden;
      position: relative;
    }

    .img-box {
      flex: 1.2;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-color);
      border-radius: 20px;
      padding: 15px;
      border: 1px solid var(--border-color);
    }

    #display-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 10px;
      transition: opacity 0.3s;
    }

    .text-box {
      flex: 1;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 30px;
      font-size: 24px;
      line-height: 1.6;
      color: var(--text-main);
      overflow-y: auto;
    }

    .vocab-line {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 18px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
    }

    .vocab-line:hover {
      background: var(--primary-color);
      color: white;
      transform: scale(1.02);
      box-shadow: var(--shadow-md);
    }

    .vocab-line:hover .line-icon {
      color: white;
      opacity: 1;
    }

    .line-icon {
      font-size: 18px;
      opacity: 0.5;
      margin-top: 4px;
      color: var(--primary-color);
    }

    .tts-hint {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 10px;
      text-align: right;
      font-style: italic;
    }

    #voice-settings-panel {
      position: absolute;
      bottom: 85px;
      right: 20px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 15px;
      padding: 15px;
      box-shadow: var(--shadow-lg);
      width: 280px;
      display: none;
      z-index: 1100;
      flex-direction: column;
      gap: 12px;
    }

    .setting-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .setting-group label {
      font-size: 12px;
      font-weight: bold;
      color: var(--text-muted);
    }

    .setting-group select,
    .setting-group input {
      padding: 8px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background: var(--bg-color);
      color: var(--text-main);
      font-size: 13px;
    }

    #settings-toggle-btn {
      position: absolute;
      bottom: 25px;
      right: 25px;
      width: 50px;
      height: 50px;
      background: var(--primary-color);
      color: white;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: var(--shadow-lg);
      z-index: 1101;
      transition: transform 0.3s;
    }

    #settings-toggle-btn:hover {
      transform: rotate(90deg);
    }

    .nav-bar {
      height: 90px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 60px;
      border-top: 1px solid var(--border-color);
    }

    .nav-btn {
      background: var(--card-bg);
      color: var(--primary-color);
      border: 2px solid var(--primary-color);
      padding: 10px 35px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .nav-btn:hover {
      background: var(--primary-color);
      color: #ffffff;
    }

    #counter {
      color: var(--text-muted);
      font-size: 18px;
      font-weight: 700;
      font-family: monospace;
    }

    #error-message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #fee2e2;
      color: #b91c1c;
      padding: 30px;
      border-radius: 15px;
      border: 1px solid #fecaca;
      text-align: center;
      display: none;
      z-index: 2000;
    }

    @media (max-width: 900px) {
      .detail-content {
        flex-direction: column;
        overflow-y: auto;
      }

      .img-box {
        flex: none;
        height: 300px;
      }

      #voice-settings-panel {
        bottom: 80px;
        width: 240px;
      }
    }
  </style>
</head>

<body>

  <div id="header-container">
    <div id="category-index">
      <button class="index-btn active" onclick="filterData('ALL')">全部單字</button>
      <button class="index-btn" onclick="filterData('A')">一般商務(A)</button>
      <button class="index-btn" onclick="filterData('B')">製造業(B)</button>
      <button class="index-btn" onclick="filterData('C')">金融預算(C)</button>
      <button class="index-btn" onclick="filterData('D')">企業發展(D)</button>
      <button class="index-btn" onclick="filterData('E')">辦公室(E)</button>
      <button class="index-btn" onclick="filterData('F')">人事(F)</button>
      <button class="index-btn" onclick="filterData('G')">採購(G)</button>
      <button class="index-btn" onclick="filterData('H')">技術面(H)</button>
      <button class="index-btn" onclick="filterData('I')">房屋(I)</button>
      <button class="index-btn" onclick="filterData('J')">旅遊(J)</button>
      <button class="index-btn" onclick="filterData('K')">外食(K)</button>
      <button class="index-btn" onclick="filterData('L')">娛樂(L)</button>
      <button class="index-btn" onclick="filterData('M')">保健(M)</button>
    </div>
    <button id="theme-toggle" onclick="toggleTheme()">
      <span id="theme-icon">🌙</span> <span id="theme-text">切換模式</span>
    </button>
  </div>

  <div id="app-container">
    <div id="gallery-grid-view"></div>
  </div>

  <div id="error-message">
    <h2>⚠️ 找不到資料檔案</h2>
    <p>請確認 <strong>A01-vocab_data.js</strong> 是否在同一個資料夾。</p>
  </div>

  <div id="main-view">
    <div class="main-header">
      <span id="card-id-label"></span>
      <button class="close-btn" onclick="closeView()">✕</button>
    </div>
    <div class="detail-content">
      <div class="img-box">
        <img id="display-img" src="" alt="單字圖卡">
      </div>
      <div id="display-text-container" style="flex:1; display:flex; flex-direction:column; position: relative;">
        <div id="display-text" class="text-box"></div>
        <span class="tts-hint">💡 滑鼠懸停於單字行即可發音 (優先使用 Google 真人音質)</span>

        <button id="settings-toggle-btn" onclick="toggleSettings()">⚙️</button>
        <div id="voice-settings-panel">
          <div class="setting-group">
            <label>選擇發音員 (推薦 Google US English)</label>
            <select id="voice-select"></select>
          </div>
          <div class="setting-group">
            <label>朗讀語速: <span id="speed-val">1.0</span>x</label>
            <input type="range" id="speed-input" min="0.5" max="1.5" step="0.1" value="1.0"
              oninput="updateSpeedVal(this.value)">
          </div>
          <div style="font-size: 11px; color: #94a3b8; margin-top: 5px;">* 若音質不佳，請嘗試切換發音員</div>
        </div>
      </div>
    </div>
    <div class="nav-bar">
      <button class="nav-btn" onclick="moveSlide(-1)"> 上一筆 </button>
      <span id="counter"></span>
      <button class="nav-btn" onclick="moveSlide(1)"> 下一筆 </button>
    </div>
  </div>

  <script>
    let currentList = [];
    let currentIndex = 0;
    let availableVoices = [];

    // 初始化語音清單，並優先選取高品質語音
    function initVoices() {
      const allVoices = window.speechSynthesis.getVoices();
      if (allVoices.length === 0) return;

      availableVoices = allVoices.filter(v => v.lang.includes('en'));

      const voiceSelect = document.getElementById('voice-select');
      const lastSelected = voiceSelect.value;
      voiceSelect.innerHTML = '';

      // 排序：將 Google 或 Natural 語音排在前面
      availableVoices.sort((a, b) => {
        const aHigh = a.name.includes('Google') || a.name.includes('Natural') || a.name.includes('Online');
        const bHigh = b.name.includes('Google') || b.name.includes('Natural') || b.name.includes('Online');
        return bHigh - aHigh;
      });

      availableVoices.forEach((voice, i) => {
        const option = document.createElement('option');
        option.value = i;
        option.textContent = voice.name.replace('Microsoft', 'MS').replace('Google', 'G-');
        voiceSelect.appendChild(option);
      });

      // 預設選擇第一個英文語音（通常是排序後的高品質語音）
      if (!lastSelected && availableVoices.length > 0) {
        voiceSelect.value = 0;
      } else {
        voiceSelect.value = lastSelected;
      }
    }

    // 監聽語音載入事件
    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = initVoices;
    }

    function toggleSettings() {
      const panel = document.getElementById('voice-settings-panel');
      panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
    }

    function updateSpeedVal(val) {
      document.getElementById('speed-val').textContent = val;
    }

    function toggleTheme() {
      document.body.classList.toggle('dark-mode');
    }

    // 核心優化：清理字串，只留英文發音部分
    function speakCleanText(rawText) {
      window.speechSynthesis.cancel();

      // 1. 取得英語部分：去除 ~~ 及其後的內容
      let clean = rawText.split('~~')[0];

      // 2. 去除開頭數字 (如 1. advertisement -> advertisement)
      clean = clean.replace(/^\d+[\s.]*/, '');

      // 3. 去除等號後的內容 (如 pilot=aviator -> pilot)
      clean = clean.split('=')[0];

      // 4. 去除波浪號內容 (如 EDM~electronic -> EDM electronic)
      clean = clean.replace(/~/g, ' ');

      if (!clean.trim()) return;

      // 5. 語音發射
      setTimeout(() => {
        const utterance = new SpeechSynthesisUtterance(clean.trim());
        const selectedIdx = document.getElementById('voice-select').value;

        if (availableVoices[selectedIdx]) {
          utterance.voice = availableVoices[selectedIdx];
        }

        utterance.rate = parseFloat(document.getElementById('speed-input').value);
        utterance.pitch = 1.0;
        utterance.volume = 1.0;

        window.speechSynthesis.speak(utterance);
      }, 60);
    }

    function processValue(raw) {
      if (!raw) return "";
      let val = raw.split('\t')[0].trim();
      return val.startsWith('0http') ? val.substring(1) : val;
    }

    function formatDriveUrl(url) {
      let cleanUrl = processValue(url);
      if (cleanUrl.includes('drive.google.com')) {
        let id = cleanUrl.includes('/d/') ? cleanUrl.split('/d/')[1].split('/')[0] : (cleanUrl.includes('id=') ? cleanUrl.split('id=')[1].split('&')[0] : "");
        return id ? `https://lh3.googleusercontent.com/d/${id}=s1600` : cleanUrl;
      }
      return cleanUrl;
    }

    function filterData(prefix) {
      document.querySelectorAll('.index-btn').forEach(b => {
        b.classList.remove('active');
        if (prefix === 'ALL' && b.innerText.includes('全部')) b.classList.add('active');
        if (prefix !== 'ALL' && b.innerText.includes(`(${prefix})`)) b.classList.add('active');
      });
      currentList = prefix === 'ALL' ? vocabData : vocabData.filter(d => processValue(d.id).toUpperCase().startsWith(prefix));
      renderGallery();
    }

    function renderGallery() {
      const grid = document.getElementById('gallery-grid-view');
      grid.innerHTML = '';
      currentList.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'grid-item';
        card.onclick = () => openView(index);
        card.innerHTML = `<div class="item-tag">${processValue(item.id)}</div><img src="${formatDriveUrl(item.url)}" loading="lazy">`;
        grid.appendChild(card);
      });
      document.getElementById('app-container').scrollTop = 0;
    }

    function openView(index) {
      currentIndex = index;
      document.getElementById('main-view').style.display = 'flex';
      updateSlide();
      if (availableVoices.length === 0) initVoices();
    }

    function closeView() {
      document.getElementById('main-view').style.display = 'none';
      window.speechSynthesis.cancel();
    }

    function updateSlide() {
      const item = currentList[currentIndex];
      const img = document.getElementById('display-img');
      const textBox = document.getElementById('display-text');

      img.style.opacity = '0';
      img.src = formatDriveUrl(item.url);
      img.onload = () => img.style.opacity = '1';

      let textVal = item.text || "";
      if (textVal.includes('\t')) {
        let pts = textVal.split('\t');
        textVal = (pts[0].includes('http')) ? pts[1] : pts[0];
      }

      const lines = textVal.split(/\\n|\n/);
      textBox.innerHTML = '';
      lines.forEach(line => {
        if (!line.trim()) return;
        const div = document.createElement('div');
        div.className = 'vocab-line';
        div.onmouseenter = () => speakCleanText(line);
        div.innerHTML = `<span class="line-icon">🔊</span><span class="line-text">${line}</span>`;
        textBox.appendChild(div);
      });

      document.getElementById('card-id-label').textContent = processValue(item.id);
      document.getElementById('counter').textContent = `${currentIndex + 1} / ${currentList.length}`;
    }

    function moveSlide(step) {
      currentIndex = (currentIndex + step + currentList.length) % currentList.length;
      updateSlide();
    }

    window.onload = () => {
      if (typeof vocabData !== 'undefined') {
        currentList = vocabData;
        renderGallery();
        setTimeout(initVoices, 1000);
      } else {
        document.getElementById('error-message').style.display = 'block';
      }
    };
  </script>
</body>

</html>
