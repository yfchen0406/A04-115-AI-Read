<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>18.批次圖片轉 WebP 工具 ~ 115.06.02</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    body {
      font-family: "Microsoft JhengHei", sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background-color: #f0f2f5;
      color: #333;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    /* ── 分頁標籤 ── */
    .tab-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      justify-content: center;
    }

    .tab-btn {
      padding: 10px 28px;
      border: 2px solid #3498db;
      border-radius: 24px;
      background: white;
      color: #3498db;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .tab-btn.active,
    .tab-btn:hover {
      background: #3498db;
      color: white;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    /* ── 共用元件 ── */
    .drop-area {
      border: 3px dashed #3498db;
      border-radius: 15px;
      padding: 50px;
      cursor: pointer;
      background: #fff;
      transition: 0.3s;
      margin-bottom: 20px;
    }

    .drop-area:hover {
      background-color: #e3f2fd;
      border-color: #2980b9;
    }

    .btn-group {
      margin: 20px 0;
      display: none;
    }

    button {
      background-color: #2ecc71;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      margin: 5px;
      font-weight: bold;
    }

    button:hover {
      background-color: #27ae60;
    }

    button.secondary {
      background-color: #3498db;
    }

    button.secondary:hover {
      background-color: #2980b9;
    }

    .status {
      margin: 15px 0;
      color: #666;
      font-weight: bold;
    }

    .file-list {
      text-align: left;
      margin-top: 20px;
      max-height: 400px;
      overflow-y: auto;
      border-top: 1px solid #eee;
      padding-top: 10px;
    }

    .file-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px;
      border-bottom: 1px solid #f9f9f9;
      font-size: 14px;
    }

    .badge {
      background: #eee;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
    }

    .badge.done {
      background: #d5f5e3;
      color: #1e8449;
    }

    .progress-bar {
      width: 100%;
      background-color: #ddd;
      border-radius: 10px;
      margin: 10px 0;
      display: none;
    }

    .progress-inner {
      width: 0%;
      height: 10px;
      background-color: #2ecc71;
      border-radius: 10px;
      transition: width 0.3s;
    }

    /* PDF 頁面品質設定 */
    .pdf-options {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 16px;
      font-size: 14px;
      color: #555;
    }

    .pdf-options select {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>📸 26.批次圖片轉 WebP 工具 ~ 115.06.02</h1>

    <!-- 分頁標籤 -->
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('img')">🖼️ JPG/PNG → WebP</button>
      <button class="tab-btn" onclick="switchTab('pdf')">📄 PDF → WebP</button>
    </div>

    <!-- ══════════ 頁籤一：圖片轉 WebP（原功能不變） ══════════ -->
    <div id="panel-img" class="tab-panel active">
      <p>一次選取多張 JPG/PNG，自動轉換並打包下載。</p>

      <div class="drop-area" onclick="document.getElementById('imgFileElem').click()">
        <p style="font-size: 1.2em; color: #555;">拖曳多張圖片到這裡，或點擊選取檔案</p>
        <input type="file" id="imgFileElem" accept="image/jpeg, image/png" multiple
          onchange="handleImgFiles(this.files)">
      </div>

      <div id="imgStatus" class="status">準備就緒</div>
      <div class="progress-bar" id="imgProgressBar">
        <div class="progress-inner" id="imgProgressInner"></div>
      </div>

      <div class="btn-group" id="imgBtnGroup">
        <button onclick="downloadImgAll()">📦 下載所有 WebP (ZIP)</button>
        <button class="secondary" onclick="resetImg()">🔄 清空重新開始</button>
      </div>

      <div class="file-list" id="imgFileList"></div>
    </div>

    <!-- ══════════ 頁籤二：PDF 拆分為 WebP ══════════ -->
    <div id="panel-pdf" class="tab-panel">
      <p>選取 PDF 檔案，每頁自動轉為 WebP 圖片並打包下載。</p>

      <div class="pdf-options">
        <label for="pdfScale">輸出品質（縮放比例）：</label>
        <select id="pdfScale">
          <option value="1">標準 1x（速度快）</option>
          <option value="1.5">清晰 1.5x</option>
          <option value="2" selected>高清 2x（推薦）</option>
          <option value="3">超高清 3x（檔案較大）</option>
        </select>
      </div>

      <div class="drop-area" id="pdfDropArea" onclick="document.getElementById('pdfFileElem').click()">
        <p style="font-size: 1.2em; color: #555;">拖曳 PDF 到這裡，或點擊選取檔案</p>
        <input type="file" id="pdfFileElem" accept="application/pdf" onchange="handlePdfFile(this.files)">
      </div>

      <div id="pdfStatus" class="status">準備就緒</div>
      <div class="progress-bar" id="pdfProgressBar">
        <div class="progress-inner" id="pdfProgressInner"></div>
      </div>

      <div class="btn-group" id="pdfBtnGroup">
        <button onclick="downloadPdfAll()">📦 下載所有 WebP (ZIP)</button>
        <button class="secondary" onclick="resetPdf()">🔄 清空重新開始</button>
      </div>

      <div class="file-list" id="pdfFileList"></div>
    </div>
  </div>

  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    // ── 設定 PDF.js Worker ──
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // ══════════════════════════════════════════
    //  頁籤切換
    // ══════════════════════════════════════════
    function switchTab(tab) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('panel-' + tab).classList.add('active');
      event.currentTarget.classList.add('active');
    }

    // ══════════════════════════════════════════
    //  頁籤一：JPG/PNG → WebP（原始功能，完整保留）
    // ══════════════════════════════════════════
    let imgConvertedFiles = [];

    async function handleImgFiles(files) {
      if (files.length === 0) return;

      const fileList = document.getElementById('imgFileList');
      const status = document.getElementById('imgStatus');
      const progressBar = document.getElementById('imgProgressBar');
      const progressInner = document.getElementById('imgProgressInner');
      const btnGroup = document.getElementById('imgBtnGroup');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      fileList.innerHTML = '';
      imgConvertedFiles = [];
      progressBar.style.display = 'block';
      btnGroup.style.display = 'none';

      const totalImgs = files.length;

      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        status.innerText = `正在轉換第 ${i + 1} / ${totalImgs} 張：${file.name}`;

        try {
          const webpBlob = await convertImageToWebp(file, canvas, ctx);
          const fileName = file.name.replace(/\.(jpe?g|png)$/i, '.webp');
          imgConvertedFiles.push({ blob: webpBlob, name: fileName });

          const item = document.createElement('div');
          item.className = 'file-item';
          item.innerHTML = `<span>${fileName}</span> <span class="badge done">已完成</span>`;
          fileList.appendChild(item);

          progressInner.style.width = ((i + 1) / files.length * 100) + '%';
        } catch (e) {
          console.error(e);
        }
      }

      status.innerText = `✅ 全部轉換完成！共 ${totalImgs} 個檔案。`;
      btnGroup.style.display = 'block';
    }

    function convertImageToWebp(file, canvas, ctx) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            canvas.toBlob((blob) => resolve(blob), 'image/webp', 0.8);
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    async function downloadImgAll() {
      if (imgConvertedFiles.length === 0) return;
      const zip = new JSZip();
      imgConvertedFiles.forEach(f => zip.file(f.name, f.blob));
      const content = await zip.generateAsync({ type: 'blob' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(content);
      link.download = 'webp_images.zip';
      link.click();
    }

    function resetImg() {
      imgConvertedFiles = [];
      document.getElementById('imgFileList').innerHTML = '';
      document.getElementById('imgStatus').innerText = '準備就緒';
      document.getElementById('imgProgressBar').style.display = 'none';
      document.getElementById('imgProgressInner').style.width = '0%';
      document.getElementById('imgBtnGroup').style.display = 'none';
      document.getElementById('imgFileElem').value = '';
    }

    // 拖曳（頁籤一）
    const imgDropArea = document.querySelector('#panel-img .drop-area');
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(n => {
      imgDropArea.addEventListener(n, e => { e.preventDefault(); e.stopPropagation(); });
    });
    imgDropArea.addEventListener('drop', e => handleImgFiles(e.dataTransfer.files));

    // ══════════════════════════════════════════
    //  頁籤二：PDF → WebP
    // ══════════════════════════════════════════
    let pdfConvertedFiles = [];
    let pdfBaseName = 'pdf';

    async function handlePdfFile(files) {
      if (!files || files.length === 0) return;
      const file = files[0];
      pdfBaseName = file.name.replace(/\.pdf$/i, '');

      const status = document.getElementById('pdfStatus');
      const progressBar = document.getElementById('pdfProgressBar');
      const progressInner = document.getElementById('pdfProgressInner');
      const btnGroup = document.getElementById('pdfBtnGroup');
      const fileList = document.getElementById('pdfFileList');
      const scale = parseFloat(document.getElementById('pdfScale').value);

      fileList.innerHTML = '';
      pdfConvertedFiles = [];
      progressBar.style.display = 'block';
      btnGroup.style.display = 'none';
      progressInner.style.width = '0%';
      status.innerText = '📖 正在讀取 PDF…';

      try {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        const totalPages = pdf.numPages;

        status.innerText = `共 ${totalPages} 頁，開始轉換…`;

        for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
          status.innerText = `正在轉換第 ${pageNum} / ${totalPages} 頁…`;

          const page = await pdf.getPage(pageNum);
          const viewport = page.getViewport({ scale });

          // 建立離屏 Canvas
          const offCanvas = document.createElement('canvas');
          offCanvas.width = viewport.width;
          offCanvas.height = viewport.height;
          const offCtx = offCanvas.getContext('2d');

          await page.render({ canvasContext: offCtx, viewport }).promise;

          // 轉 WebP Blob
          const blob = await new Promise(res =>
            offCanvas.toBlob(res, 'image/webp', 0.85)
          );

          const digits = Math.max(3, String(totalPages).length);
          const pageStr = String(pageNum).padStart(digits, '0');
          const fileName = `page_${pageStr}.webp`;

          pdfConvertedFiles.push({ blob, name: fileName });

          const item = document.createElement('div');
          item.className = 'file-item';
          item.innerHTML = `<span>${fileName}</span>
            <span class="badge done">第 ${pageNum} 頁 ✓</span>`;
          fileList.appendChild(item);
          fileList.scrollTop = fileList.scrollHeight;

          progressInner.style.width = (pageNum / totalPages * 100) + '%';
        }

        status.innerText = `✅ 轉換完成！共 ${totalPages} 頁。`;
        btnGroup.style.display = 'block';

      } catch (err) {
        console.error(err);
        status.innerText = '❌ 轉換失敗，請確認檔案是否為有效的 PDF。';
      }
    }

    async function downloadPdfAll() {
      if (pdfConvertedFiles.length === 0) return;
      const status = document.getElementById('pdfStatus');
      status.innerText = '📦 正在打包 ZIP，請稍候…';

      const zip = new JSZip();
      pdfConvertedFiles.forEach(f => zip.file(f.name, f.blob));
      const content = await zip.generateAsync({ type: 'blob' });

      const link = document.createElement('a');
      link.href = URL.createObjectURL(content);
      link.download = `${pdfBaseName}_webp.zip`;
      link.click();
      status.innerText = `✅ 已下載：${pdfBaseName}_webp.zip`;
    }

    function resetPdf() {
      pdfConvertedFiles = [];
      document.getElementById('pdfFileList').innerHTML = '';
      document.getElementById('pdfStatus').innerText = '準備就緒';
      document.getElementById('pdfProgressBar').style.display = 'none';
      document.getElementById('pdfProgressInner').style.width = '0%';
      document.getElementById('pdfBtnGroup').style.display = 'none';
      document.getElementById('pdfFileElem').value = '';
    }

    // 拖曳（頁籤二）
    const pdfDropArea = document.getElementById('pdfDropArea');
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(n => {
      pdfDropArea.addEventListener(n, e => { e.preventDefault(); e.stopPropagation(); });
    });
    pdfDropArea.addEventListener('drop', e => handlePdfFile(e.dataTransfer.files));
  </script>
</body>

</html>
