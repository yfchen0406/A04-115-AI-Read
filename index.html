  <script type="text/javascript">
    var Scroll = new function () {
      this.delay = 3000; //公告換行的時間
      this.height = 22; //定義高度
      this.step = 2; // 步長，20高度換4次
      this.curHeight = 0;
      this.stimer = null;
      this.timer = null;
      this.start = function () { //開始翻頁-調用move方法
        this.move();
      }

      this.move = function () {
        var self = this;
        console.log(this);
        if (this.curHeight == this.height) //如果顯示完一行
        {
          this.timer = setTimeout(function () { //使用計時器-定時下一行的翻頁時間
            self.move();
          }, this.delay);
          this.curHeight = 0;
          if (this.element.scrollTop >= this.element.scrollHeight - this.height) { //滾動資訊已經完畢
            this.element.scrollTop = 0;
          }
          return true;
        }
        this.element.scrollTop += this.step;
        this.curHeight += this.step;
        this.timer = setTimeout(function () { //設置自動翻頁計時器
          self.move();
        }, 120);
      }

      // this.stop = function () { //清除定時期，停止滾動翻頁
      //  clearTimeout(this.timer);
      // }
    }
  </script>

          '#F8F8FF', // GhostWhite
          '#F5FFFA', // MintCream
          '#F0FFF0', // Honeydew
          '#F0FFFF', // Azure
          '#FAFAD2', // LightGoldenRodYellow
          '#ADD8E6', // LightBlue (這個會稍微亮一點點，但仍在淺色系)
          '#E0FFFF', // LightCyan
          '#CCEEFF'  // Custom Light Sky Blue (自定義的淺天藍色)
        ];
        const randomIndex = Math.floor(Math.random() * lightColors.length);
        return lightColors[randomIndex];
      }



      // 重複執行部分
      function generateHomepage() {
        // icon 隨機產生，從這邊開始  ~~  主要產生
        // 隨機排序卡片資料陣列
        const shuffledCardsData = shuffleArray(cardsData);
        // 卡片重新排列，這時候重新選取一個淺色底色
        const randomBgColor = getRandomLightColor(); // 獲取一個隨機淺色

        // 獲取卡片容器
        const cardContainer = document.getElementById('card-container');
        cardContainer.innerHTML = '';
        // 生成卡片 HTML

        shuffledCardsData.forEach(card => {
          const cardHTML = `
    <div class="card col-md-4 yf-bg-w1 yf-font2" style="background-color: ${randomBgColor};">
      <h1 id="${card.idName}" class="fa-solid ${card.iconClass} mt-3 display-1" style="color:${card.iconColor}"></h1>
      <div class="card-body">
        <h5 class="card-title yf-animista-1 yf-font2"><strong class="yf-font2 yf-title yf-blink-2">${card.title}</strong></h5>
        <p class="card-text yf-blink- " title=""><strong class="yf-font2">${card.date}</strong></p>
        <a href="${card.link}" class="btn btn-dark yf-animista-3 ${card.disable}" title="">${card.enterName}</a>
      </div>
    </div>
  `;
          // 將卡片 HTML 插入到卡片容器中
          cardContainer.innerHTML += cardHTML;
        });


        // ********************** 變化icon顏色 *************************************************
        // 選擇所有的 <h1> 標籤
        const h1Elements = document.querySelectorAll('h1');

        // 對每個 <h1> 標籤進行操作
        h1Elements.forEach(h1 => {
          // 產生隨機顏色
          const randomColor = getRandomColor();

          // 設置 <h1> 標籤的 style.color 屬性
          h1.style.color = randomColor;
        });
        // 初始設置隨機顏色
        setRandomColors();


      }


      // 亂數洗牌~外部被呼叫
      // Fisher-Yates 演算法來實現隨機排序
      function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          // 交換元素
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }


      // 變化文字顏色、設置隨機顏色~~外部被呼叫
      function setRandomColors() {
        const elements = document.querySelectorAll('.yf-title'); // 選擇所有具有 card-title 類的元素

        elements.forEach(element => {
          const randomColor = getRandomColor();
          element.style.color = randomColor;
        });
      }

      // 每10秒執行一次首頁隨機變化
      setInterval(generateHomepage, 15000);
      // 頁面加載時先生成一次卡片
      generateHomepage();


      /// 這部分沒用可以刪除
      setTimeout(function () {
        // 在這裡放置你想要延遲執行的程式碼
        console.log('一秒後執行的程式碼');
      }, 1000); // 延遲時間為 1000 毫秒，即一秒
      //setTimeout();

    }
  </script>
