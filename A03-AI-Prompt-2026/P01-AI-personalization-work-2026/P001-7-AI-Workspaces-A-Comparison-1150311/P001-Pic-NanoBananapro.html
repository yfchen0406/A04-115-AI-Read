<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>圖解 AI ｜七大平台深度比較圖集</title>
  <style>
    /* 1. 基本頁面重置，確保無邊距且背景黑色（更有簡報感） */
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      /* 防止出現滾動條 */
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 2. 圖片容器佔滿全螢幕 */
    #image-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 3. 關鍵：限制圖片最大寬高不超過螢幕，並保持比例 */
    #current-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      /* 確保圖片不變形地縮放到範圍內 */
    }

    /* 4. 控制項樣式調整 */
    #controls-overlay {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      background-color: rgba(0, 0, 0, 0.6);
      color: white;
      border-radius: 30px;
      /* 膠囊形狀更美觀 */
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      text-align: center;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 15px;
      backdrop-filter: blur(5px);
      /* 毛玻璃效果 */
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    #index-display {
      font-size: 1.1em;
      font-weight: bold;
      min-width: 60px;
    }

    #tip {
      font-size: 0.75em;
      opacity: 0.6;
      border-left: 1px solid rgba(255, 255, 255, 0.3);
      padding-left: 10px;
    }

    #prev-btn,
    #next-btn {
      padding: 6px 15px;
      font-size: 0.9em;
      cursor: pointer;
      border: none;
      background-color: #444;
      color: white;
      border-radius: 20px;
      transition: background-color 0.2s;
    }

    #prev-btn:hover,
    #next-btn:hover {
      background-color: #007bff;
    }
  </style>

<body>

  <div id="image-container">
    <img id="current-image" src="" alt="簡報圖片">
  </div>

  <div id="controls-overlay">
    <button id="prev-btn">上一張 (↑)</button>
    <span id="index-display">0 / 0</span>
    <button id="next-btn">下一張 (↓)</button>
    <div id="tip">
      按下 ↑ (上鍵) 或 ↓ (下鍵) 切換
    </div>
  </div>

  <script>
    // 1. 圖片資料庫 (由於是純前端，我們在此硬編碼圖片檔案名稱)
    // 請確保這些檔案 (P01.jpg, P02.jpg, P03.jpg, P04.jpg, P05.jpg) 存在於與此腳本相同的資料夾中。
    const IMAGE_FILES = [
      './images/P001-0A.webp',
      './images/P001-2.webp',
      './images/P001-3.webp',
      './images/P001-4-1.webp',
      './images/P001-4-2.webp',
      './images/P001-5.webp', 
      './images/P001-6.webp',
      './images/P001-7.webp',
      './images/P001-8.webp',



    ];

    let currentIndex = 0; // 當前顯示的圖片索引，從 0 開始
    const totalImages = IMAGE_FILES.length;

    // 2. 獲取 DOM 元素
    const imageElement = document.getElementById('current-image');
    const indexDisplay = document.getElementById('index-display');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');

    /**
     * 根據當前的 currentIndex 顯示圖片並更新索引號
     */
    function displayImage() {
      if (totalImages === 0) {
        imageElement.src = '';
        indexDisplay.textContent = '無圖片';
        return;
      }

      // 設置圖片的檔案路徑
      imageElement.src = IMAGE_FILES[currentIndex];

      // 更新索引顯示 (例如：1 / 5, 數字是從 1 開始)
      indexDisplay.textContent = `${currentIndex + 1} / ${totalImages}`;
    }

    /**
     * 切換到上一張圖片
     */
    function goToPreviousImage() {
      if (currentIndex > 0) {
        currentIndex--;
        displayImage();
      } else {
        // 可選：到達第一張時可以震動或顯示提示
        console.log("已是第一張圖片");
      }
    }

    /**
     * 切換到下一張圖片
     */
    function goToNextImage() {
      if (currentIndex < totalImages - 1) {
        currentIndex++;
        displayImage();
      } else {
        // 可選：到達最後一張時可以震動或顯示提示
        console.log("已是最後一張圖片");
      }
    }

    // 3. 綁定事件監聽器

    // 綁定按鈕點擊事件
    prevBtn.addEventListener('click', goToPreviousImage);
    nextBtn.addEventListener('click', goToNextImage);

    // 綁定鍵盤事件
    document.addEventListener('keydown', (event) => {
      // 檢查按下的鍵是否為向上箭頭或向下箭頭
      if (event.key === 'ArrowUp') {
        goToPreviousImage();
      } else if (event.key === 'ArrowDown') {
        goToNextImage();
      }

      // 防止滾動：
      // 如果是上下鍵，阻止瀏覽器預設的捲動行為
      if (event.key === 'ArrowUp' || event.key === 'ArrowDown') {
        event.preventDefault();
      }
    });


    // 4. 網頁載入完成後，執行第一次圖片顯示
    document.addEventListener('DOMContentLoaded', () => {
      displayImage();
    });

  </script>
</body>

</html>
