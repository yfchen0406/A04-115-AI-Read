  <script type="module">
    import { createApp, ref, reactive, computed } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js'
    import { Data } from './js/data.js';


    const table1 = createApp({
      setup() {
        // 使用 ref 定義響應式狀態（物件數組）
        const book = ref([...Data.reverse()]);
        //book.value = [...Data].sort((a, b) => b.Start_Date.localeCompare(a.Start_Date));


        // sortByC1 函數動態接收欄位名稱參數
        const sortByS1 = (field) => {
          book.value = [...Data].sort((a, b) => {
            // 將缺失資料的欄位視為空字串處理
            const valA = a[field] || '';
            const valB = b[field] || '';
            return String(valA).localeCompare(String(valB));
          });
        };

        // sortByC2 函數進行降序排序
        const sortByS2 = (field) => {
          book.value = [...Data].sort((a, b) => {
            // 將缺失資料的欄位視為空字串處理
            const valA = a[field] || '';
            const valB = b[field] || '';
            return String(valB).localeCompare(String(valA)); // 降序排序
          });
        };

        // sortByC1 函數動態接收欄位名稱參數
        const sortByC1 = (field) => {
          book.value = [...Data].sort((a, b) => {
            // 將缺失資料的欄位視為數值處理
            const valA = Number(a[field] || 0);
            const valB = Number(b[field] || 0);
            return valA - valB;
          });
        };

        // sortByC2 函數進行降序排序
        const sortByC2 = (field) => {
          book.value = [...Data].sort((a, b) => {
            // 將缺失資料的欄位視為數值處理
            const valA = Number(a[field] || 0);
            const valB = Number(b[field] || 0);
            return valB - valA;
          });
        };



        // 返回數據
        return {
          sortByS1,
          sortByS2,
          sortByC1,
          sortByC2,
          book,
        };
      }
    }).mount('#table1')


  </script>
